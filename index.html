<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Semakan Kokurikulum SMKATB (MOD X-RAY)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="p-10 bg-gray-900 text-white font-sans text-center">

    <h1 class="text-3xl font-bold text-yellow-500 mb-5">MOD X-RAY (MENCARI PUNCA MASALAH)</h1>
    
    <button onclick="scanSheet()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-bold text-xl mb-10 shadow-lg border-2 border-white">
        🔍 TEKAN SINI UNTUK SCAN RUMAH SUKAN
    </button>

    <div id="paparanXray" class="bg-gray-800 p-5 rounded-xl border border-yellow-500 text-left overflow-auto max-w-4xl mx-auto hidden">
        <h3 class="text-red-400 font-bold mb-3 text-lg">HASIL X-RAY (Sila copy semua teks di bawah dan beri pada saya):</h3>
        <pre id="hasilScan" class="text-green-400 font-mono text-sm whitespace-pre-wrap"></pre>
    </div>

    <script>
        function scanSheet() {
            const btn = document.querySelector('button');
            btn.innerHTML = "Sedang Scan...";
            
            // Link Rumah Sukan yang Uncle bagi tadi
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSoP03gP_u4CstSfD8NCpBMeAhbEMFhyJMYe0nTFGyWZfwfOA9myf-eq45T9AcEZnyEsa-eOFMjm1O2/pub?gid=54717596&single=true&output=csv';

            Papa.parse(url, {
                download: true,
                header: false,
                complete: function(results) {
                    const data = results.data;
                    let textTunjuk = "JUMLAH BARIS DIKESAN: " + data.length + "\n\n";
                    
                    // Kita scan 5 baris pertama sahaja untuk tengok struktur
                    for(let i = 0; i < Math.min(5, data.length); i++) {
                        textTunjuk += "BARIS " + i + " : " + JSON.stringify(data[i]) + "\n";
                    }

                    document.getElementById('hasilScan').textContent = textTunjuk;
                    document.getElementById('paparanXray').classList.remove('hidden');
                    btn.innerHTML = "Selesai Scan!";
                },
                error: function(err) {
                    document.getElementById('hasilScan').textContent = "RALAT: " + err.message;
                    document.getElementById('paparanXray').classList.remove('hidden');
                }
            });
        }
    </script>
</body>
</html>
