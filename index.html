<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Semakan Kokurikulum SMKATB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background: #0f172a; color: white; }
        .poster-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .btn-gradient { background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%); transition: 0.3s; }
        .btn-gradient:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(217, 119, 6, 0.4); }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .table-header { background: #f59e0b; color: #000; }
        .unit-btn { transition: all 0.2s ease-in-out; }
        .unit-btn:hover { background-color: #f59e0b; color: black; border-color: #f59e0b; transform: scale(1.05); }
        .unit-btn.active { background-color: #f59e0b; color: black; border-color: #f59e0b; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">

    <div class="text-center mb-10 border-b-4 border-yellow-500 pb-6 inline-block w-full">
        <h1 class="poster-font text-5xl md:text-7xl italic font-black text-white tracking-tighter">
            SEMAKAN AHLI <span class="text-yellow-500 text-shadow-xl">KOKURIKULUM</span>
        </h1>
        <p class="text-lg tracking-[0.5em] font-light mt-2 opacity-80 uppercase">SMKA Tok Bachok • Sesi 2026</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <button onclick="fetchData('Beruniform')" class="btn-gradient p-6 rounded-xl poster-font text-xl shadow-lg">🛡️ Badan Beruniform</button>
        <button onclick="fetchData('Kelab')" class="btn-gradient p-6 rounded-xl poster-font text-xl shadow-lg">🧠 Kelab & Persatuan</button>
        <button onclick="fetchData('Sukan')" class="btn-gradient p-6 rounded-xl poster-font text-xl shadow-lg">⚽ Sukan & Permainan</button>
        <button onclick="fetchData('RumahSukan')" class="btn-gradient p-6 rounded-xl poster-font text-xl shadow-lg">🏠 Rumah Sukan</button>
    </div>

    <div id="unitMenuContainer" class="hidden max-w-5xl mx-auto mb-8 text-center">
        <h3 class="text-yellow-500 font-bold mb-4 tracking-widest uppercase">Pilih Kumpulan Untuk Paparan:</h3>
        <div id="unitMenu" class="flex flex-wrap justify-center gap-3"></div>
    </div>

    <div id="loading" class="hidden text-center mb-5">
        <div class="inline-block p-3 bg-yellow-500 text-black font-bold animate-pulse rounded">MEMUATKAN DATA...</div>
    </div>

    <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl max-w-6xl mx-auto">
        <div class="overflow-x-auto">
            <table class="w-full text-left" id="memberTable">
                <thead>
                    <tr class="table-header poster-font text-lg italic">
                        <th class="p-4 w-16 text-center">BIL</th>
                        <th class="p-4 w-32">NO KP</th>
                        <th class="p-4">NAMA PENUH</th>
                        <th class="p-4 w-32 text-center">KELAS</th>
                        <th class="p-4 w-48 text-center">UNIT/RUMAH</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-100 italic">
                    <tr>
                        <td colspan="5" class="p-10 text-center opacity-50 font-bold tracking-widest">SILA PILIH KATEGORI DI ATAS (CUBA TEKAN RUMAH SUKAN)</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_LINKS = {
            'Beruniform': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5qD2LhAVY_gkp21qV6VZ8CG4WjcmTDOlJ10Cj1TbuVl3PHsSYhlmBskPY2TU3KA/pub?output=csv',
            'Kelab': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9WaQcM0HKQYoTF4gUYBn2OZyGTWEEpVXOWCF1SFLmh7rbdA52JYcoY3fF-HyYfg/pub?output=csv',
            'Sukan': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSE062ycwmtzTnXqs57QGb_QH3C8EsFFGs3VbrpBapaNk_H5E2g6jsveBoSMrhIXg/pub?output=csv',
            'RumahSukan': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSoP03gP_u4CstSfD8NCpBMeAhbEMFhyJMYe0nTFGyWZfwfOA9myf-eq45T9AcEZnyEsa-eOFMjm1O2/pub?output=csv'
        };

        let currentSheetData = []; 
        let globalUnitCol = ""; // Simpan nama lajur (contoh: RUMAH SUKAN) untuk rujukan fungsi paparan

        function fetchData(category) {
            const loading = document.getElementById('loading');
            const tableBody = document.getElementById('tableBody');
            const unitMenuContainer = document.getElementById('unitMenuContainer');
            const unitMenu = document.getElementById('unitMenu');
            
            loading.classList.remove('hidden');
            unitMenuContainer.classList.add('hidden');
            tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-yellow-400">Sedang menyusun senarai...</td></tr>';

            const csvUrl = SHEET_LINKS[category];

            Papa.parse(csvUrl, {
                download: true,
                header: true, 
                skipEmptyLines: true,
                transformHeader: function(header) {
                    // Buang 'space' tambahan dan jadikan huruf besar supaya senang detect
                    return header.trim().toUpperCase();
                },
                complete: function(results) {
                    currentSheetData = results.data;
                    
                    if(currentSheetData.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-400">Fail dapat dibaca, tetapi tiada rekod murid dijumpai.</td></tr>';
                        loading.classList.add('hidden');
                        return;
                    }

                    // Sistem bijak mengesan lajur yang patut dijadikan butang
                    let headers = Object.keys(currentSheetData[0]);
                    
                    // Ia akan cari mana-mana lajur yang bernama seperti di bawah
                    globalUnitCol = headers.find(h => ["RUMAH SU
